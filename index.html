<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bateria Social</title>
<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

<style>
body {
    background: #eee; /* Mantém o fundo personalizado */
    /* As propriedades de flexbox e altura serão gerenciadas pelo Bootstrap no body tag */
    font-family: Arial, sans-serif;
}

.broche {
    /* background: #1e1e1e; */ /* Substituído por bg-dark */
    /* border-radius: 20px; */ /* Substituído por rounded-4 */
    /* padding: 20px; */ /* Substituído por p-4 */
    width: 420px;
    /* color: gold; */ /* Substituído por text-warning */
    /* box-shadow: 0 5px 20px rgba(0,0,0,0.4); */ /* Substituído por shadow-lg */
}

.titulo {
    text-align: center;
    font-size: 22px;
    margin-bottom: 15px;
}

/* BARRA */
.barra {
    position: relative;
    height: 40px;
    border-radius: 10px;
    display: flex;
    overflow: hidden;
    margin-bottom: 20px;
}

.segmento {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 18px;
    position: relative;
}

.red { background: #ff4d4d; }
.pink { background: #ff7aa2; }
.yellow { background: #ffd966; }
.green { background: #6fdc6f; }
.blue { background: #6fd0ff; }

/* SLIDER */
.slider {
    position: relative;
    height: 12px;
    background: #ccc;
    border-radius: 6px;
}

.raio {
    position: absolute;
    top: -18px;
    left: 0;
    font-size: 32px;
    cursor: grab;
    transition: transform 0.15s ease;
}

.raio:active {
    cursor: grabbing;
    transform: scale(1.2);
}

/* BALÃO */
.tooltip {
    position: absolute;
    bottom: 55px; /* Mantém a posição personalizada */
    left: 0;
    transform: translateX(-50%) scale(0.8);
    /* background: #222; */ /* Substituído por bg-dark */
    /* color: #fff; */ /* Substituído por text-white */
    /* padding: 8px 12px; */ /* Substituído por p-2 */
    /* border-radius: 10px; */ /* Substituído por rounded */
    font-size: 13px;
    opacity: 0;
    pointer-events: none;
    transition: 0.2s ease;
}

/* seta do balão */
.tooltip::after {
    content: "";
    position: absolute;
    bottom: -6px;
    left: 50%;
    transform: translateX(-50%); /* Mantém a transformação personalizada */
    border-width: 6px;
    border-style: solid;
    border-color: #222 transparent transparent transparent;
}

.tooltip.show {
    opacity: 1;
    transform: translateX(-50%) scale(1);
}

/* LEGENDA */
.legenda {
    margin-top: 25px;
    /* display: grid; */ /* Substituído por row */
    /* grid-template-columns: repeat(2, 1fr); */ /* Substituído por col-6 */
    /* gap: 10px; */ /* Substituído por g-2 */
    /* border-top: 1px solid #444; */ /* Substituído por border-top border-secondary */
    /* padding-top: 15px; */ /* Substituído por pt-3 */
    font-size: 13px;
    color: #ccc; /* Mantém a cor personalizada ou pode ser text-light */
}

.legenda-item {
    display: flex;
    align-items: center;
    gap: 8px;
}
</style>
</head>

<body class="d-flex justify-content-center align-items-center min-vh-100">

<div class="broche bg-dark rounded-4 p-4 shadow-lg" style="width: 420px;">
    <div class="titulo text-center fs-5 mb-3 text-warning">MINHA BATERIA SOCIAL</div>

    <div class="barra" id="barra">
        <div class="segmento red">😞</div>
        <div class="segmento red">🙁</div>
        <div class="segmento pink">😕</div>
        <div class="segmento yellow">😐</div>
        <div class="segmento green">🙂</div>
        <div class="segmento blue">😊</div>
        <div class="segmento blue">😁</div>
    </div>

    <div class="slider bg-secondary rounded-pill" id="slider">
        <div class="raio" id="raio">⚡</div>
        <div class="tooltip bg-dark text-white p-2 rounded" id="tooltip"></div>
    </div>

    <div class="legenda row g-2 pt-3 border-top border-secondary text-light">
        <div class="legenda-item col-6 gap-2"><span>😞</span> Muito esgotado</div>
        <div class="legenda-item col-6 gap-2"><span>🙁</span> Esgotado</div>
        <div class="legenda-item col-6 gap-2"><span>😕</span> Baixo</div>
        <div class="legenda-item col-6 gap-2"><span>😐</span> Neutro</div>
        <div class="legenda-item col-6 gap-2"><span>🙂</span> Bem</div>
        <div class="legenda-item col-6 gap-2"><span>😊</span> Animado</div>
        <div class="legenda-item col-6 gap-2"><span>😁</span> No topo</div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
<script>
const raio = document.getElementById("raio");
const slider = document.getElementById("slider");
const tooltip = document.getElementById("tooltip");

const estados = [
    "Muito esgotado 😞",
    "Esgotado 🙁",
    "Baixo 😕",
    "Neutro 😐",
    "Bem 🙂",
    "Animado 😊",
    "No topo 😁"
];

let dragging = false;

/* FUNÇÃO PARA ATUALIZAR */
function atualizar(posX) {
    const rect = slider.getBoundingClientRect();
    let x = posX - rect.left;

    if (x < 0) x = 0;
    if (x > rect.width) x = rect.width;

    raio.style.left = x + "px";

    // calcular índice
    let index = Math.floor((x / rect.width) * estados.length);
    if (index >= estados.length) index = estados.length - 1;

    // atualizar tooltip
    tooltip.innerText = estados[index];
    tooltip.style.left = x + "px";
    tooltip.classList.add("show");
}

/* MOUSE */
raio.addEventListener("mousedown", () => dragging = true);
document.addEventListener("mouseup", () => {
    dragging = false;
    tooltip.classList.remove("show");
});
document.addEventListener("mousemove", (e) => {
    if (dragging) atualizar(e.clientX);
});

/* TOUCH (CELULAR) */
raio.addEventListener("touchstart", () => dragging = true);

document.addEventListener("touchend", () => {
    dragging = false;
    tooltip.classList.remove("show");
});

document.addEventListener("touchmove", (e) => {
    if (dragging) {
        atualizar(e.touches[0].clientX);
    }
});
</script>

</body>
</html>
